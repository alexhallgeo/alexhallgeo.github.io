name: Deploy Website

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Get files
        uses: actions/checkout@v4

      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: .     # Use all files in the main folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
