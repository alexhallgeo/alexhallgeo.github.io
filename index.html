<style>
    :root {
      --text: #1c1c1c;
      --muted: #555;
      --border: #e0e0e0;
      --link: #1a6496;
      --bg: #ffffff;
      --sidebar: #f8f8f8;
    }

    /* Dark Mode */
    [data-theme="dark"] {
      --text: #e0e0e0;
      --muted: #aaaaaa;
      --border: #444;
      --link: #4a9eff;
      --bg: #1a1a1a;
      --sidebar: #252525;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      transition: background 0.3s, color 0.3s;
    }

    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Toggle Button */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--sidebar);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 45px;
      height: 45px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      cursor: pointer;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: all 0.3s;
    }
    .theme-toggle:hover {
      transform: scale(1.1);
    }

    /* Rest of your existing styles (updated with variables) */
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 0;
      min-height: 100vh;
    }

    aside {
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      padding: 2.5rem 1.5rem;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    main {
      padding: 2.5rem 2.5rem 4rem;
    }

    .section {
      margin-bottom: 3rem;
      padding-bottom: 3rem;
      border-bottom: 1px solid var(--border);
    }
    .section:last-child { border-bottom: none; }

    h1, h2, h3 { color: var(--text); }
    h2 { border-bottom: 1px solid var(--border); }

    p, .pub-authors, .exp-date, .award-amount, .edu-year, .conf-year {
      color: var(--muted);
    }

    /* Keep your other styles the same but they will now use variables */
    /* ... (I kept the rest identical for you) */
</style>
